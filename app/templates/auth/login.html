{% extends 'base.html' %}
{% block title %}Log In — Devine Adventures{% endblock %}

{% block head %}
<style>
  .page-enter { animation: none; }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 0;
    color: #9CA3AF; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: #374151; }
</style>
{% endblock %}

{% block content %}
<div class="auth-scene"
     style="background-image: url('https://images.unsplash.com/photo-1547970810-dc1eac37d174?w=1600&q=80');">
  <div class="auth-scene__overlay"></div>

  <div class="auth-modal">

    <div class="auth-modal__header">
      <div class="auth-modal__eyebrow">Welcome back</div>
      <h2 class="auth-modal__title">Log in</h2>
      <p class="auth-modal__sub">Continue your adventure</p>
    </div>

    <form method="POST" action="{{ url_for('main.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="auth-modal__field">
        <label class="auth-modal__label" for="email">Email</label>
        <input class="auth-modal__input" type="email" id="email" name="email"
               placeholder="you@example.com" required autofocus autocomplete="email">
      </div>

      <div class="auth-modal__field">
        <label class="auth-modal__label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="auth-modal__input" type="password" id="password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Show password">
            <!-- Eye icon -->
            <svg id="eye-password" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (hidden by default) -->
            <svg id="eyeoff-password" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <label class="auth-modal__remember">
        <input type="checkbox" name="remember">
        <span>Remember me</span>
      </label>

      <button type="submit" class="auth-modal__submit">Log In</button>
    </form>

    <div class="auth-modal__footer">
      No account yet?
      <a href="{{ url_for('main.register') }}">Sign up free</a>
    </div>

  </div>
</div>

<script>
  function togglePw(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    document.getElementById('eye-' + fieldId).style.display = isHidden ? 'none' : 'block';
    document.getElementById('eyeoff-' + fieldId).style.display = isHidden ? 'block' : 'none';
  }
</script>
{% endblock %}
