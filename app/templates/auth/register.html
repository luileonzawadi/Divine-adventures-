{% extends 'base.html' %}
{% block title %}Sign Up — Devine Adventures{% endblock %}

{% block head %}
<style>.page-enter { animation: none; }</style>
{% endblock %}

{% block content %}
<div class="auth-scene"
     style="background-image: url('https://images.unsplash.com/photo-1504432842672-1a79f78e4084?w=1600&q=80');">
  <div class="auth-scene__overlay"></div>

  <div class="auth-modal">

    <div class="auth-modal__header">
      <div class="auth-modal__eyebrow">Join us</div>
      <h2 class="auth-modal__title">Create account</h2>
    </div>


    <input type="hidden" name="role" value="traveler" form="reg-form">


    <form method="POST" action="{{ url_for('main.register') }}" id="reg-form" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="auth-modal__row2">
        <div class="auth-modal__field">
          <label class="auth-modal__label" for="name">Name</label>
          <input class="auth-modal__input" type="text" id="name" name="name" placeholder="Jane Doe" required autocomplete="name">
        </div>
      </div>
      <div class="auth-modal__row2">
        <div class="auth-modal__field">
          <label class="auth-modal__label" for="email">Email</label>
          <input class="auth-modal__input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="auth-modal__row2">
        <div class="auth-modal__field">
          <label class="auth-modal__label" for="password">Password</label>
          <input class="auth-modal__input" type="password" id="password" name="password" placeholder="Min. 8 chars" required minlength="8" autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="auth-modal__submit">Create Account</button>
    </form>

    <div class="auth-modal__footer">
      Already have an account?
      <a href="{{ url_for('main.login') }}">Log in</a>
    </div>

  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll('.auth-modal__role input').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('.auth-modal__role-face').forEach(f => f.classList.remove('on'));
      if (r.checked) r.closest('.auth-modal__role').querySelector('.auth-modal__role-face').classList.add('on');
    });
    if (r.checked) r.closest('.auth-modal__role').querySelector('.auth-modal__role-face').classList.add('on');
  });
</script>
{% endblock %}
