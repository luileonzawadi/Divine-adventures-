<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Card Payment...</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8F9FA;
      color: #1F2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loader-container {
      text-align: center;
      max-width: 400px;
      padding: var(--space-8);
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #E9ECEF;
      border-top-color: #635bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    h2 {
      font-weight: 600;
      font-size: 1.25rem;
      margin-bottom: 8px;
    }
    p {
      color: #6B7280;
      font-size: 0.875rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="spinner"></div>
    <h2>Processing secure payment...</h2>
    <p>Please do not close this window or refresh the page. We are securely validating your card details with Stripe...</p>
    <div id="debug-info" style="margin-top: 20px; font-size: 10px; color: #ADB5BD; font-family: monospace;"></div>
  </div>

  <script>
    const webhookUrl = "{{ url_for('payments.stripe_webhook') }}";
    const successUrl = "{{ url_for('payments.stripe_success', session_id=payment.reference) }}";
    
    // Simulate real webhook payload format
    const payload = {
      "type": "checkout.session.completed",
      "data": {
        "object": {
          "id": "{{ payment.reference }}",
          "metadata": {
            "booking_reference": "{{ booking.booking_reference }}"
          },
          "amount_total": {{ (booking.deposit_amount_usd * 100)|round|int }},
          "currency": "usd"
        }
      }
    };

    const debugDiv = document.getElementById('debug-info');

    // Perform background AJAX request to webhook
    fetch(webhookUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    })
      .then(response => response.json())
      .then(data => {
        debugDiv.innerText = "Webhook response: " + JSON.stringify(data);
        // Redirect to success route
        setTimeout(() => {
          window.location.href = successUrl;
        }, 1200);
      })
      .catch(err => {
        console.error("Simulation error:", err);
        debugDiv.innerText = "Simulation error: " + err;
        // Fallback redirect anyway
        setTimeout(() => {
          window.location.href = successUrl;
        }, 1500);
      });
  </script>
</body>
</html>
